name: Build and Push Eagapps Image to GHCR
on:
  workflow_dispatch:

env:
  IMAGE_NAME: eagapps
  PYTHON_VERSION: 3.14

jobs:
  push:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v6
        with:
          submodules: true
      
      - name: Setup app.json
        run: |
          cat > apps.json <<EOF
          [
            {
              "url": "${{ secrets.EAGAPPS_URL }}",
              "branch": "${{ secrets.EAGAPPS_BRANCH }}"
            }
          ]
          EOF
                  
      - name: Build image
        run: >
          docker build 
          --build-arg=FRAPPE_PATH=https://github.com/frappe/frappe
          --build-arg=FRAPPE_BRANCH=version-16
          --build-arg=PYTHON_VERSION=3.14
          --secret=id=apps_json,src=apps.json
          --tag=${{ env.IMAGE_NAME }}
          --file=frappe_docker/images/custom/Containerfile ./frappe_docker
      
      - name: Remove apps.json
        if: "${{ always() }}"
        run: rm apps.json
      
      - name: Log in to registry
        run: >
          echo "${{ secrets.GITHUB_TOKEN }}" | 
          docker login ghcr.io -u ${{ github.actor }} --password-stdin
      
      - name: Push image
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          # Change any uppercase character into lowercase
          IMAGE_ID=$(echo "$IMAGE_ID" | tr "[A-Z]" "[a-z]")
          # Strip the git ref prefix from te version
          VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')
          # Strip te "v" prefix from the tag name
          [[ "${{ github.ref }}" == "refs/tags/"* ]] && VERSION=$(echo $VERSION | sed -e 's/^v//')
          [ "$VERSION" == "main" ] && VERSION=latest
          echo IMAGE_ID="${IMAGE_ID}"
          echo VERSION="${VERSION}"

          docker tag "${{ env.IMAGE_NAME }}" "${IMAGE_ID}:${VERSION}"
          docker push "${IMAGE_ID}:${VERSION}"
        